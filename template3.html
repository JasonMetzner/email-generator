<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Conversation with Support</title>
  </head>
  <body style="margin:0;padding:0;background-color:#ffffff;font-family:'Inter', Arial, sans-serif;">
    <center>
      <!-- Outer wrapper for the chat template -->
      <table width="600" cellpadding="0" cellspacing="0" style="margin:auto;background-color:#ffffff;border-collapse:collapse;font-family:'Inter', Arial, sans-serif;">
        <!-- Hero image -->
        <tr>
          <td>
            <img src="images/hero3_small.jpg" alt="" width="600" style="display:block;border:0;width:100%;height:auto;" />
          </td>
        </tr>
        <!-- Chat title -->
        <tr>
          <td style="padding:20px;text-align:center;">
            <h2 style="font-size:26px;color:#2b2b2b;margin:0 0 12px;font-weight:600;">Conversation with Support</h2>
          </td>
        </tr>
        <!-- Conversation area -->
        <tr>
          <td style="padding:20px;background-color:#f7f9fb;">
            <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
              <!-- Message 1 (left) -->
              <tr>
                <td align="left">
                  <table style="max-width:80%;">
                    <tr>
                      <td style="background-color:#f1f5fe;padding:12px;border-radius:10px;margin:6px 0;font-size:14px;color:#2b2b2b;">
                        Hi there! Need help with your order?
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
              <!-- Message 2 (right) -->
              <tr>
                <td align="right">
                  <table style="max-width:80%;">
                    <tr>
                      <td style="background-color:#e3fcec;padding:12px;border-radius:10px;margin:6px 0;font-size:14px;color:#2b2b2b;">
                        Yes, please provide more info.
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Call to action -->
        <tr>
          <td style="padding:20px;text-align:center;">
            <a href="#" style="display:inline-block;padding:14px 28px;border-radius:24px;text-decoration:none;background-image:linear-gradient(135deg,#42E695 0%,#3BB2B8 100%);color:#ffffff;font-weight:600;font-size:16px;">Contact Us</a>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="padding:30px 20px;font-size:12px;color:#888888;text-align:center;">
            <p style="margin:0;">&copy; 2026 Your Company. 123 Main Street, City, Country</p>
            <p style="margin:5px 0;">
              <a href="{{ unsubscribe_link }}" style="color:#888888;text-decoration:underline;">Unsubscribe</a>
            </p>
          </td>
        </tr>
      </table>
    </center>
  </body>
</html>
